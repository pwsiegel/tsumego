workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-4
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 100
    containerSpec:
      imageUri: us-central1-docker.pkg.dev/tsumego-pwsiegel/apps/training:latest
      args:
        - boards
        - --limit=50
        - --epochs=2
        - --model-out=/gcs/tsumego-pwsiegel-data/data/models/_smoke_board_detector.pt
serviceAccount: tsumego-runtime@tsumego-pwsiegel.iam.gserviceaccount.com
scheduling:
  strategy: SPOT
  restartJobOnWorkerRestart: true
